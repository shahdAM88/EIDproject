<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eid Air Writing - Hand Tracking</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto; background:#0b1020; color:#fff; }
    header { padding: 14px 16px; display:flex; gap:10px; align-items:center; justify-content:space-between; border-bottom: 1px solid rgba(255,255,255,.08); }
    .btns { display:flex; gap:8px; flex-wrap:wrap; }
    button {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,.12); }
    main { display:grid; grid-template-columns: 1fr; gap: 10px; padding: 12px; }
    .wrap { position: relative; width: min(980px, 96vw); margin: 0 auto; }
    video, canvas { width: 100%; height: auto; border-radius: 18px; display:block; }
    canvas { position:absolute; inset:0; }
    .hint { opacity:.85; font-size:14px; line-height:1.6; padding: 0 6px; text-align: right; width: min(980px, 96vw); margin: 0 auto; }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background: rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); }
  </style>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>

<body>
  <header>
    <div>
      <div style="font-weight:700">Eid Air Writing ✨</div>
      <div style="font-size:12px; opacity:.75">Hand Tracking + Air Drawing (MediaPipe)</div>
    </div>
    <div class="btns">
      <button id="toggleDraw">الرسم: ON</button>
      <button id="clear">مسح</button>
      <button id="autoEid">ارسم "عيد مبارك" تلقائياً</button>
    </div>
  </header>

  <main>
    <div class="wrap">
      <video id="video" playsinline></video>
      <canvas id="overlay"></canvas>
    </div>
    <div class="hint">
      حرّكي <span class="pill">السبابة</span> أمام الكاميرا للرسم.
      اقبضي يدك (قبضة) لإيقاف الرسم مؤقتًا.
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
